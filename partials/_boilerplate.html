<!--
================================================================
AChETIQ — Esqueleto base HTML (boilerplate)
Asociación Chaqueña de Estudiantes Tecnológicos de Ingeniería Química
----------------------------------------------------------------
Versión: 1.0 · Fase 2 — Desarrollo front-end
Fundamento: FASE_1_Catalogo_Componentes.md §14 (próximos pasos, ítem 1)

PROPÓSITO
  Plantilla única reutilizable para TODAS las páginas del sitio:
  las seis páginas de primer nivel en la raíz (index.html,
  sobre-achetiq.html, gabinetes.html, actividades.html,
  recursos-academicos.html, contacto.html) y las páginas hijas de
  pages/gabinetes/ y pages/recursos/.

CÓMO USAR
  1. Copiar este archivo como base de una página nueva.
  2. Reemplazar TODOS los marcadores «REEMPLAZAR: …» por el valor
     real de la página. Cada uno está señalado con un comentario.
  3. Borrar este bloque de comentarios de cabecera en la copia
     final (es documentación de la plantilla, no de la página).
  4. Escribir el contenido de la página dentro de <main>.

SUPUESTO DE DESPLIEGUE — RUTAS RELATIVAS
  Todas las rutas son relativas a la página actual (./ para páginas
  en la raíz, ../ para páginas en pages/gabinetes/ o pages/recursos/).
  Esta convención hace al sitio independiente del host: funciona
  igual servido desde la raíz de un dominio (achetiq.org.ar),
  desde un subpath de GitHub Pages (usuario.github.io/repo/) o
  abierto localmente (file://).
  Al copiar este boilerplate para una página dentro de una
  subcarpeta, reemplazar los prefijos «./» por «../» (un nivel)
  o «../../» (dos niveles) según corresponda.

CONVENCIÓN DE NOMBRE
  Prefijo «_» (partials/_boilerplate.html): indica que es una
  plantilla de referencia, no una página servible.
================================================================
-->
<!DOCTYPE html>
<html lang="es-AR">
<head>

  <!-- Codificación y viewport — obligatorios, iguales en toda página. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!--
    TÍTULO — patrón fijo: «{Título de la página} - AChETIQ».
    REEMPLAZAR: el título de la página antes de « - AChETIQ».
    Ejemplos: «Inicio - AChETIQ» — «Sobre AChETIQ - AChETIQ»
              «Gabinetes - AChETIQ» — «Contacto - AChETIQ».
  -->
  <title>REEMPLAZAR título de página - AChETIQ</title>

  <!--
    META DESCRIPTION — única por página (FASE_1 §7.5 SEO).
    REEMPLAZAR: resumen de la página en ~150-160 caracteres,
    tono formal académico, sin signos de exclamación.
  -->
  <meta name="description" content="REEMPLAZAR descripción única de esta página.">

  <!-- ============================================================
       FAVICON E ICONOS
       Archivos ya existentes en la raíz del repositorio.
       No requieren reemplazo: son los mismos en todas las páginas.
       ============================================================ -->
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="icon" href="./favicon.ico" sizes="32x32">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png"><!-- 180x180 -->
  <link rel="manifest" href="./site.webmanifest">
  <meta name="theme-color" content="#0D3B66"><!-- = var(--color-primary) -->

  <!-- ============================================================
       TIPOGRAFÍAS — AUTOALOJADAS (assets/fonts/)
       Decisión: fuentes self-hosted (sin Google Fonts / CDN) para
       privacidad, rendimiento y cero dependencias de terceros.

       Las declaraciones @font-face viven en assets/css/main.css,
       NO en este HTML. Cada @font-face debe incluir
       «font-display: swap;». Archivos .woff2 esperados en
       assets/fonts/ (pendiente: agregarlos al repositorio):

         instrument-serif-400.woff2         (display, normal)
         instrument-serif-400-italic.woff2  (display, itálica)
         geist-400.woff2                    (cuerpo / UI, regular)
         geist-500.woff2                    (cuerpo / UI, medium)
         geist-mono-400.woff2               (mono, regular)
         geist-mono-500.woff2               (mono, medium)

       Familias y pesos definidos en tokens.css
       (--font-display / --font-body / --font-mono; pesos 400 y 500).

       PRECARGA: se precargan solo las dos fuentes críticas para el
       primer render (cuerpo de texto y títulos display). Las demás
       las resuelve el @font-face bajo demanda.
       ============================================================ -->
  <link rel="preload" href="./assets/fonts/geist-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/instrument-serif-400.woff2" as="font" type="font/woff2" crossorigin>

  <!-- ============================================================
       HOJAS DE ESTILO
       tokens.css primero (define las variables); main.css después.
       ============================================================ -->
  <link rel="stylesheet" href="./tokens.css">
  <link rel="stylesheet" href="./assets/css/main.css">

  <!-- ============================================================
       OPEN GRAPH / TWITTER CARD
       REEMPLAZAR por página: og:title, og:description.

       URL BASE CENTRALIZADA — el dominio de og:url, og:image y
       twitter:image NO se escribe a mano: vive en site.config.mjs
       (BASE_URL) y lo aplica `npm run build:urls`
       (scripts/build-urls.mjs). Para migrar de dominio se cambia
       una sola línea en site.config.mjs y se re-ejecuta el script.

       · og:url ......... build:urls lo deriva de la ruta del
                          archivo bajo pages/ (dejar el placeholder).
       · og:image /
         twitter:image .. logo social compartido; build:urls los
                          mantiene en sync con BASE_URL.
       ============================================================ -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="AChETIQ">
  <meta property="og:locale" content="es_AR">
  <meta property="og:title" content="REEMPLAZAR título para redes - AChETIQ">
  <meta property="og:description" content="REEMPLAZAR descripción para redes.">
  <meta property="og:url" content="REEMPLAZAR ruta de la página; build:urls aplica el dominio de site.config.mjs">
  <meta property="og:image" content="https://ingqcautnfrre-lab.github.io/achetiq-lab/icon-512.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="REEMPLAZAR título para redes - AChETIQ">
  <meta name="twitter:description" content="REEMPLAZAR descripción para redes.">
  <meta name="twitter:image" content="https://ingqcautnfrre-lab.github.io/achetiq-lab/icon-512.png">

</head>
<body>

  <!--
    SKIP-LINK — accesibilidad (FASE_1_Catalogo_Componentes.md §1.4).
    Primer elemento del <body>, antes del navbar. Apunta al <main>.
    No reemplazar: idéntico en todas las páginas.
  -->
  <a class="skip-link" href="#main-content">Saltar al contenido principal</a>

  <!--
    NAVBAR — placeholder de carga dinámica (FASE_1 §1.2).
    js/navbar.js reemplaza este nodo: carga partials/navbar.html y
    configura los enlaces desde data/navbar.json.
    El <noscript> garantiza un header mínimo (wordmark + enlace al
    inicio) si el navegador tiene JS deshabilitado (criterio de
    aceptación 6 del prompt canónico).
    No reemplazar: idéntico en todas las páginas.
  -->
  <div data-loader="navbar">
    <noscript>
      <header class="navbar-fallback">
        <div class="navbar-fallback__inner">
          <a class="navbar-fallback__brand" href="./index.html">AChETIQ</a>
        </div>
      </header>
    </noscript>
  </div>

  <!--
    MAIN — contenido principal de la página.
    id="main-content" y tabindex="-1": destino del skip-link
    (FASE_1 §1.4). class="page": contenedor de ancho máximo y
    padding (FASE_1 §1.1, tokens.css).
  -->
  <main id="main-content" class="page" tabindex="-1">

    <!-- ════════════════════════════════════════════════════════
         REEMPLAZAR: aquí va el contenido propio de cada página.
         Usar las secciones y componentes del catálogo
         (FASE_1_Catalogo_Componentes.md). Respetar el tono formal
         académico y la prohibición de signos de exclamación
         (INSTRUCCION_PROYECTO.md §6).
         ════════════════════════════════════════════════════════ -->

  </main>

  <!--
    FOOTER — placeholder de carga dinámica.
    assets/js/footer.js reemplaza este nodo: carga partials/footer.html y
    pobla los items de contacto e iconos de redes desde data/redes.json,
    además de inyectar el año dinámico en la línea legal (FASE_1 §1.3).
    El <noscript> garantiza un pie mínimo (línea legal) si el navegador
    tiene JS deshabilitado.
    No reemplazar: idéntico en todas las páginas.
  -->
  <div data-loader="footer">
    <noscript>
      <footer class="footer-fallback" role="contentinfo">
        <div class="footer-fallback__inner">
          <p>© 2026 Asociación Chaqueña de Estudiantes Tecnológicos de Ingeniería Química · UTN FRRe</p>
        </div>
      </footer>
    </noscript>
  </div>

  <!--
    LOADER GLOBAL — overlay «Bouncing Dots» (assets/css/loader.css).
    Overlay fijo a pantalla completa; arranca con el atributo
    `hidden`. loader.js lo muestra/oculta vía AChETIQLoader.show()
    / .hide(). Animación 100 % CSS. Cada punto lleva la clase
    .safe-motion para conservar una animación accesible bajo
    prefers-reduced-motion (ver main.css §2 y loader.css).
    No reemplazar: idéntico en todas las páginas.
  -->
  <div class="loader loader--overlay loader--msg-bottom" id="global-loader"
       role="status" aria-live="polite" hidden>
    <div class="loader__dots">
      <span class="loader__dot safe-motion"></span>
      <span class="loader__dot safe-motion"></span>
      <span class="loader__dot safe-motion"></span>
    </div>
    <p class="loader__message">Cargando…</p>
  </div>

  <!--
    SCRIPTS — al final del <body>, como módulo ES (sin transpilación,
    FASE_1 §7.2 / INSTRUCCION_PROYECTO §2.1).
    loader.js — helper sin dependencias del overlay global; script
    clásico para exponer window.AChETIQLoader antes de los módulos.
    navbar.js — autoinicia y reemplaza el placeholder data-loader="navbar";
    se carga independientemente para no depender de main.js (que orquesta
    el resto de loaders [data-loader] del documento).
    No reemplazar: idéntico en todas las páginas.
  -->
  <script src="./assets/js/loader.js"></script>
  <script src="./assets/js/navbar.js"></script>
  <script src="./assets/js/footer.js"></script>
  <script type="module" src="./assets/js/main.js"></script>

</body>
</html>
